<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sprint Blog — Preview</title>
<script src="sprint-storage.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f1117;
  --surface:#1a1d27;
  --surface2:#22263a;
  --accent:#7c6af7;
  --accent-dim:#4e45a0;
  --text:#e2e4ef;
  --text-dim:#7a7f9a;
  --border:#2a2e42;
  --code-bg:#0d1117;
  --mono:'Courier New',Courier,monospace;
  --sans:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  --serif:Georgia,'Times New Roman',serif;
  --sidebar-w:200px;
  --nav-h:48px;
  --r:6px;
  --t:100ms ease;
  --tok-kw:#ff7b72;
  --tok-str:#a5d6ff;
  --tok-cmt:#8b949e;
  --tok-num:#79c0ff;
  --tok-op:#ffa657;
  --tok-def:#e6edf3;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--mono);font-size:14px}

/* NAV */
#nav{
  position:fixed;top:0;left:0;right:0;height:var(--nav-h);
  background:var(--surface);border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:12px;padding:0 16px;z-index:100;
}
.nav-title{font-size:13px;font-weight:700;color:var(--accent);letter-spacing:.03em;white-space:nowrap}
.nav-badge{
  font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;
  background:var(--accent-dim);color:#c0b8ff;padding:3px 8px;border-radius:20px;
}
#nav-right{display:flex;align-items:center;gap:10px;margin-left:auto}
#topic-jump{
  background:var(--surface2);color:var(--text);border:1px solid var(--border);
  border-radius:var(--r);padding:4px 8px;font-family:var(--mono);font-size:12px;cursor:pointer;
}
.nav-edit-link{
  background:var(--surface2);color:var(--text-dim);border:1px solid var(--border);
  border-radius:var(--r);padding:5px 12px;font-family:var(--mono);font-size:11px;
  font-weight:600;text-decoration:none;transition:all var(--t);white-space:nowrap;
}
.nav-edit-link:hover{color:var(--accent);border-color:var(--accent)}

/* LAYOUT */
#layout{display:flex;height:calc(100vh - var(--nav-h));margin-top:var(--nav-h);overflow:hidden}

/* SIDEBAR */
#sidebar{
  width:var(--sidebar-w);min-width:var(--sidebar-w);background:var(--surface);
  border-right:1px solid var(--border);display:flex;flex-direction:column;
  overflow:hidden;transition:width var(--t),min-width var(--t);
}
#sidebar.collapsed{width:40px;min-width:40px}
#sidebar-toggle{
  background:none;border:none;color:var(--text-dim);cursor:pointer;
  padding:10px;font-size:16px;text-align:center;flex-shrink:0;
  border-bottom:1px solid var(--border);transition:color var(--t);
}
#sidebar-toggle:hover{color:var(--accent)}
#topic-list{list-style:none;overflow-y:auto;flex:1;padding:4px 0}
#topic-list::-webkit-scrollbar{width:4px}
#topic-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.topic-item{
  display:flex;align-items:center;gap:8px;padding:7px 10px;
  cursor:pointer;transition:background var(--t);white-space:nowrap;overflow:hidden;
}
.topic-item:hover{background:var(--surface2)}
.topic-item.active{background:var(--accent-dim);color:#fff}
.topic-label{font-family:var(--mono);font-size:12px;font-weight:600}
.status-dot{
  width:10px;height:10px;border-radius:50%;flex-shrink:0;
  border:1.5px solid var(--text-dim);background:transparent;
  position:relative;overflow:hidden;transition:all var(--t);
}
.status-dot.half::after{
  content:'';position:absolute;left:0;top:0;width:50%;height:100%;background:var(--accent);
}
.status-dot.full{background:var(--accent);border-color:var(--accent)}
#sidebar.collapsed .topic-label{display:none}
#sidebar.collapsed .status-dot{margin:0 auto}
#sidebar.collapsed .topic-item{justify-content:center;padding:8px 0}
#sidebar.collapsed #sidebar-footer{display:none}
#sidebar-footer{
  padding:10px 12px;border-top:1px solid var(--border);flex-shrink:0;
}
#sidebar-footer a{
  color:var(--text-dim);text-decoration:none;font-size:11px;
  transition:color var(--t);display:block;margin-bottom:4px;
}
#sidebar-footer a:last-child{margin-bottom:0}
#sidebar-footer a:hover{color:var(--accent)}

/* MAIN */
#main-panel{flex:1;overflow:hidden;display:flex;flex-direction:column}

/* POST SCROLL AREA */
#post-scroll{
  flex:1;overflow-y:auto;padding:32px 24px;display:flex;flex-direction:column;
  align-items:center;
}
#post-scroll::-webkit-scrollbar{width:6px}
#post-scroll::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

/* ── BLOG POST CARD ─────────────────────────────────────────────────────────── */
#post-card{
  background:#ffffff;color:#1a1a2e;border-radius:var(--r);
  width:100%;max-width:72ch;padding:56px 64px;
  font-family:var(--serif);line-height:1.75;font-size:16px;
  box-shadow:0 8px 48px rgba(0,0,0,.6);
}

/* Typography */
.post-title{
  font-size:34px;font-weight:700;line-height:1.2;color:#080818;
  margin-bottom:10px;font-family:var(--serif);
}
.post-subtitle{
  font-size:19px;color:#555;font-style:italic;
  margin-bottom:22px;font-family:var(--serif);line-height:1.5;
}
.post-meta{
  display:flex;align-items:center;gap:10px;flex-wrap:wrap;
  margin-bottom:36px;padding-bottom:22px;border-bottom:1.5px solid #e8e8ee;
  font-family:var(--sans);font-size:13px;color:#666;
}
.post-date::after,.post-readtime::after{content:'·';margin-left:10px;color:#ccc}
.post-meta :last-child::after{content:''}
.tag-pill{
  background:var(--accent);color:#fff;padding:2px 10px;
  border-radius:4px;font-size:11px;font-weight:600;letter-spacing:.03em;
}
.tag-pill::after{content:''}

/* Body */
.post-body h1{font-size:28px;margin:36px 0 14px;line-height:1.25;color:#080818}
.post-body h2{
  font-size:22px;margin:30px 0 12px;line-height:1.3;color:#12122a;
  padding-bottom:7px;border-bottom:1.5px solid #e0e0ea;
}
.post-body h3{font-size:18px;margin:24px 0 8px;line-height:1.35;color:#1a1a2e}
.post-body p{margin:0 0 18px;color:#1a1a2e}
.post-body ul{margin:0 0 18px 26px}
.post-body ol{margin:0 0 18px 26px}
.post-body li{margin-bottom:7px;color:#1a1a2e}
.post-body strong{font-weight:700;color:#080818}

/* Pull-quote blockquote */
.post-body blockquote{
  border-left:4px solid var(--accent);
  background:linear-gradient(to right,#f5f3ff,#faf9ff);
  margin:28px 0;padding:18px 24px;
  border-radius:0 var(--r) var(--r) 0;
}
.post-body blockquote p{
  font-size:20px;color:#2a1a6e;font-style:italic;
  margin:0;line-height:1.65;font-family:var(--serif);
}

/* Code */
.post-body pre{
  background:var(--code-bg);border-radius:var(--r);
  overflow-x:auto;margin:20px 0;border:1px solid var(--border);padding:0;
}
.post-body pre code{
  display:block;padding:18px 20px;font-family:var(--mono);font-size:13px;
  line-height:1.6;background:none;color:var(--tok-def);white-space:pre;
}
.post-body :not(pre)>code{
  font-family:var(--mono);font-size:13.5px;background:#eeeaff;
  color:#4a2fc0;padding:2px 6px;border-radius:3px;
}

/* Code highlighting tokens (same as editor) */
.tok-keyword{color:var(--tok-kw)}
.tok-string{color:var(--tok-str)}
.tok-comment{color:var(--tok-cmt);font-style:italic}
.tok-number{color:var(--tok-num)}
.tok-operator{color:var(--tok-op)}
.ln{
  display:inline-block;min-width:3.5ch;color:#3d4452;text-align:right;
  margin-right:16px;user-select:none;-webkit-user-select:none;
}

/* Code block label */
.post-body pre[data-lang]::before{
  content:attr(data-lang);display:block;padding:6px 20px 4px;
  font-family:var(--mono);font-size:11px;color:#5a6380;
  border-bottom:1px solid var(--border);letter-spacing:.06em;
  text-transform:uppercase;
}

/* EMPTY STATE */
#empty-state{
  display:none;flex-direction:column;align-items:center;justify-content:center;
  width:100%;max-width:72ch;gap:14px;padding:80px 20px;text-align:center;
}
#empty-state .big{font-size:40px;opacity:.2}
#empty-state p{color:var(--text-dim);font-size:13px;line-height:1.7}
#empty-state a{color:var(--accent);text-decoration:none}
#empty-state a:hover{text-decoration:underline}

/* Loading indicator */
#loading-bar{
  height:2px;background:var(--accent);position:fixed;top:var(--nav-h);left:0;width:0;
  z-index:150;transition:width .3s ease,opacity .3s ease;
}
#loading-bar.active{width:70%}
#loading-bar.done{width:100%;opacity:0}

/* PRINT */
@media print{
  #nav,#sidebar{display:none!important}
  #layout,#main-panel,#post-scroll{all:unset;display:block!important}
  #post-card{box-shadow:none;max-width:100%;padding:0;border-radius:0}
  body{background:#fff}
}

/* MOBILE */
@media(max-width:640px){
  #post-card{padding:28px 20px}
  #sidebar{
    position:fixed;top:var(--nav-h);left:0;bottom:0;z-index:50;
    transition:transform var(--t);
  }
  #sidebar.collapsed{transform:translateX(-100%);width:var(--sidebar-w);min-width:var(--sidebar-w)}
}
</style>
</head>
<body>

<nav id="nav">
  <span class="nav-title">Sprint Blog</span>
  <span class="nav-badge">Preview</span>
  <div id="nav-right">
    <select id="topic-jump" aria-label="Jump to topic"></select>
    <a class="nav-edit-link" href="ai-blog.html" id="edit-link">← Edit</a>
  </div>
</nav>

<div id="loading-bar"></div>

<div id="layout">
  <aside id="sidebar">
    <button id="sidebar-toggle" title="Toggle sidebar">☰</button>
    <ul id="topic-list" role="listbox"></ul>
    <div id="sidebar-footer">
      <a href="ai-blog.html" id="sb-edit-link">← Edit</a>
      <a href="ai-agent-course.html">← Slides &amp; Handout</a>
    </div>
  </aside>

  <main id="main-panel">
    <div id="post-scroll">
      <article id="post-card" style="display:none"></article>
      <div id="empty-state">
        <div class="big">✦</div>
        <p>No blog post saved for this topic yet.<br>
           <a href="ai-blog.html" id="empty-edit-link">Open the editor →</a> to write one.</p>
      </div>
    </div>
  </main>
</div>

<script>
'use strict';

// ── Keywords ──────────────────────────────────────────────────────────────────
const KEYWORDS = {
  python: new Set(['def','return','if','elif','else','for','while','import',
    'class','and','or','not','in','True','False','None','with','as','try',
    'except','raise','pass','yield','lambda','from','global','del','is',
    'async','await','print','len','range','self','super','isinstance',
    'type','str','int','float','list','dict','set','bool','tuple']),
  typescript: new Set(['const','let','var','function','return','if','else',
    'for','while','class','import','export','from','async','await','typeof',
    'new','this','true','false','null','undefined','throw','try','catch',
    'interface','type','extends','implements','readonly','public','private',
    'protected','static','void','string','number','boolean','any','never',
    'enum','namespace','abstract','declare','keyof','infer','switch','case',
    'break','continue','do','default','finally','instanceof','of','yield']),
  javascript: new Set(['const','let','var','function','return','if','else',
    'for','while','class','import','export','from','async','await','typeof',
    'new','this','true','false','null','undefined','throw','try','catch',
    'switch','case','break','continue','do','default','finally','instanceof','of']),
  bash: new Set(['if','then','else','elif','fi','for','in','do','done',
    'while','case','esac','function','return','export','echo','local',
    'source','exit','shift','set','unset','readonly','declare']),
  json: new Set(['true','false','null']),
  text: new Set()
};

// ── Utilities ─────────────────────────────────────────────────────────────────
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function tokenize(code, lang) {
  const kws = KEYWORDS[lang]||KEYWORDS.text;
  const tokens=[]; let i=0; const n=code.length;
  while (i<n) {
    const ch=code[i], ch2=code.slice(i,i+2), ch3=code.slice(i,i+3);
    if ((ch==='#'&&(lang==='python'||lang==='bash'||lang==='text'))||
        (ch2==='\x2f\x2f'&&(lang==='typescript'||lang==='javascript'))) {
      let t=''; while(i<n&&code[i]!=='\n') t+=code[i++];
      tokens.push({type:'comment',text:t}); continue;
    }
    if (lang==='python'&&(ch3==='"""'||ch3==="'''")) {
      const q=ch3; let t=q; i+=3;
      while(i<n&&code.slice(i,i+3)!==q) t+=code[i++];
      if(i<n){t+=q;i+=3;} tokens.push({type:'string',text:t}); continue;
    }
    if (ch==='`'&&(lang==='typescript'||lang==='javascript')) {
      let t='`'; i++;
      while(i<n&&code[i]!=='`'){if(code[i]==='\\'){t+=code[i++];if(i<n)t+=code[i++];}else t+=code[i++];}
      if(i<n){t+='`';i++;} tokens.push({type:'string',text:t}); continue;
    }
    if (ch==='"'||ch==="'") {
      const q=ch; let t=q; i++;
      while(i<n&&code[i]!==q&&code[i]!=='\n'){if(code[i]==='\\'){t+=code[i++];if(i<n)t+=code[i++];}else t+=code[i++];}
      if(i<n&&code[i]===q){t+=q;i++;} tokens.push({type:'string',text:t}); continue;
    }
    if (/[0-9]/.test(ch)||(ch==='.'&&i+1<n&&/[0-9]/.test(code[i+1]))) {
      let t=''; while(i<n&&/[0-9.eExXbBoO_]/.test(code[i])) t+=code[i++];
      tokens.push({type:'number',text:t}); continue;
    }
    if (/[a-zA-Z_$]/.test(ch)) {
      let t=''; while(i<n&&/[a-zA-Z0-9_$]/.test(code[i])) t+=code[i++];
      tokens.push({type:kws.has(t)?'keyword':'default',text:t}); continue;
    }
    if (/[+\-*\/=<>!&|^~%@?:;.,[\]{}()]/.test(ch)) {
      tokens.push({type:'operator',text:ch}); i++; continue;
    }
    tokens.push({type:'default',text:ch}); i++;
  }
  return tokens;
}

function renderHighlighted(code, lang) {
  if (!code && code!==0) code='';
  const tokens=tokenize(String(code),lang||'text');
  const lines=[[]];
  tokens.forEach(tok=>{
    tok.text.split('\n').forEach((part,idx)=>{
      if(idx>0) lines.push([]);
      if(part!=='') lines[lines.length-1].push({type:tok.type,text:part});
    });
  });
  return lines.map((line,i)=>{
    const num=String(i+1).padStart(4,' ');
    const content=line.map(tok=>{
      const t=esc(tok.text);
      return tok.type==='default'?t:`<span class="tok-${tok.type}">${t}</span>`;
    }).join('');
    return `<span class="ln" aria-hidden="true">${esc(num)} </span>${content}`;
  }).join('\n');
}

function parseMarkdown(text) {
  const lines=text.split('\n');
  let html='', inCode=false, codeLang='text', codeLines=[];
  let inList=false, paraLines=[];
  function inline(s) {
    s=esc(s);
    s=s.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
    s=s.replace(/`([^`]+?)`/g,'<code>$1</code>');
    return s;
  }
  function flushPara(){if(!paraLines.length)return;html+=`<p>${paraLines.map(inline).join('<br>')}</p>\n`;paraLines=[];}
  function flushList(){if(!inList)return;html+='</ul>\n';inList=false;}
  function flushCode(){
    html+=`<pre class="code-block" data-lang="${esc(codeLang)}"><code>${renderHighlighted(codeLines.join('\n'),codeLang)}</code></pre>\n`;
    codeLines=[];inCode=false;codeLang='text';
  }
  for (const l of lines) {
    if (/^```/.test(l)) {
      if (inCode){flushCode();}
      else {
        flushPara();flushList();inCode=true;codeLines=[];
        let lang=l.trim().slice(3).toLowerCase()||'text';
        if(lang==='js')lang='javascript';if(lang==='ts')lang='typescript';
        if(lang==='sh'||lang==='shell'||lang==='zsh')lang='bash';
        codeLang=lang;
      }
      continue;
    }
    if (inCode){codeLines.push(l);continue;}
    let m;
    if ((m=l.match(/^(#{1,3})\s+(.*)/))) {
      flushPara();flushList();
      const lvl=m[1].length, cls=lvl===2?' class="ruled"':'';
      html+=`<h${lvl}${cls}>${inline(m[2])}</h${lvl}>\n`;
    } else if ((m=l.match(/^>\s?(.*)/))) {
      flushPara();flushList();
      html+=`<blockquote><p>${inline(m[1])}</p></blockquote>\n`;
    } else if ((m=l.match(/^[-*]\s+(.*)/))) {
      flushPara();if(!inList){html+='<ul>\n';inList=true;}
      html+=`<li>${inline(m[1])}</li>\n`;
    } else if (!l.trim()){flushPara();flushList();}
    else {flushList();paraLines.push(l);}
  }
  flushPara();flushList();if(inCode)flushCode();
  return html;
}

function wordStats(text) {
  const words=(text.trim().match(/\S+/g)||[]).length;
  return {words, mins:Math.max(1,Math.round(words/200))};
}

const lsGet   = k => FS.get(k);
const blogKey = n => `sprint_t${n}_blog`;

function topicHasBlog(n) {
  const raw = FS.get('sprint_status');
  if (!raw) return false;
  try { const obj = JSON.parse(raw); return !!(obj[`t${n}`]?.blog); } catch { return false; }
}

// ── State ─────────────────────────────────────────────────────────────────────
let currentTopic = 1;

// ── Sidebar ───────────────────────────────────────────────────────────────────
function buildSidebar() {
  const list=document.getElementById('topic-list');
  const jump=document.getElementById('topic-jump');
  list.innerHTML=''; jump.innerHTML='';
  for (let n=1;n<=30;n++) {
    const has=topicHasBlog(n);
    const li=document.createElement('li');
    li.className='topic-item'+(n===currentTopic?' active':'');
    li.dataset.n=n;
    li.innerHTML=`<span class="status-dot ${has?'full':''}"></span><span class="topic-label">T${n}</span>`;
    li.addEventListener('click',()=>loadTopic(n));
    list.appendChild(li);
    const opt=Object.assign(document.createElement('option'),{value:n,textContent:`T${n}`});
    if(n===currentTopic)opt.selected=true;
    jump.appendChild(opt);
  }
}

function refreshSidebarStatus() {
  document.querySelectorAll('.topic-item').forEach(li=>{
    const n=parseInt(li.dataset.n);
    li.querySelector('.status-dot').className=`status-dot ${topicHasBlog(n)?'full':''}`;
  });
}

// ── Render post ───────────────────────────────────────────────────────────────
function _showLoading() {
  const bar = document.getElementById('loading-bar');
  bar.classList.remove('done'); bar.classList.add('active');
}
function _hideLoading() {
  const bar = document.getElementById('loading-bar');
  bar.classList.remove('active'); bar.classList.add('done');
  setTimeout(() => bar.classList.remove('done'), 400);
}

async function loadTopic(n) {
  currentTopic=n;
  document.getElementById('topic-jump').value=n;
  document.querySelectorAll('.topic-item').forEach(li=>
    li.classList.toggle('active',parseInt(li.dataset.n)===n));

  document.getElementById('edit-link').href='ai-blog.html';
  document.getElementById('sb-edit-link').href='ai-blog.html';
  document.getElementById('empty-edit-link').href='ai-blog.html';

  history.replaceState(null,'',`#t${n}`);

  _showLoading();
  await FS.loadTopic(n);
  _hideLoading();
  renderPost(n);
  refreshSidebarStatus();
}

function renderPost(n) {
  const card=document.getElementById('post-card');
  const empty=document.getElementById('empty-state');
  const raw=lsGet(blogKey(n));

  let data=null;
  if (raw) { try{data=JSON.parse(raw);}catch{} }

  const hasContent = data && (data.title||data.body);

  card.style.display   = hasContent ? 'block' : 'none';
  empty.style.display  = hasContent ? 'none'  : 'flex';
  refreshSidebarStatus();

  if (!hasContent) return;

  const {words,mins}=wordStats(data.body||'');
  const tags=(data.tags||'').split(',').map(t=>t.trim()).filter(Boolean);
  const dateStr=data.date
    ? new Date(data.date+'T12:00:00').toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'})
    : '';
  const tagsHtml=tags.map(t=>`<span class="tag-pill">${esc(t)}</span>`).join('');

  card.innerHTML=[
    data.title    ? `<h1 class="post-title">${esc(data.title)}</h1>`        : '',
    data.subtitle ? `<p class="post-subtitle">${esc(data.subtitle)}</p>`    : '',
    `<div class="post-meta">`,
    dateStr ? `<span class="post-date">${esc(dateStr)}</span>` : '',
    words>0 ? `<span class="post-readtime">~${mins} min read · ${words.toLocaleString()} words</span>` : '',
    tagsHtml,
    `</div>`,
    `<div class="post-body">${data.body ? parseMarkdown(data.body) : '<p style="color:#aaa;font-style:italic">Post body is empty.</p>'}</div>`,
  ].join('\n');

  // Scroll to top
  document.getElementById('post-scroll').scrollTop=0;
}

// ── Init ──────────────────────────────────────────────────────────────────────
(async function init() {
  const hash = location.hash.match(/^#t(\d+)$/);
  const hashTopic = hash ? Math.min(30, Math.max(1, parseInt(hash[1]))) : null;

  document.getElementById('topic-jump').addEventListener('change', function() {
    loadTopic(parseInt(this.value));
  });
  document.getElementById('sidebar-toggle').addEventListener('click', () =>
    document.getElementById('sidebar').classList.toggle('collapsed'));

  await FS.loadStatus();

  let start = hashTopic || 1;
  if (!hashTopic) {
    for (let n = 1; n <= 30; n++) { if (topicHasBlog(n)) { start = n; break; } }
  }
  currentTopic = start;

  buildSidebar();
  await loadTopic(currentTopic);

  // Refresh when tab regains focus (editor may have just saved)
  document.addEventListener('visibilitychange', async () => {
    if (document.visibilityState === 'visible') {
      await FS.loadStatus();
      await FS.refresh(currentTopic);
      refreshSidebarStatus();
      renderPost(currentTopic);
    }
  });
})();
</script>
</body>
</html>
