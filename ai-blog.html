<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sprint Blog &amp; Code — AI Agent Sprint</title>
<script src="sprint-storage.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f1117;
  --surface:#1a1d27;
  --surface2:#22263a;
  --accent:#7c6af7;
  --accent-dim:#4e45a0;
  --text:#e2e4ef;
  --text-dim:#7a7f9a;
  --border:#2a2e42;
  --code-bg:#0d1117;
  --mono:'Courier New',Courier,monospace;
  --sans:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  --sidebar-w:220px;
  --nav-h:48px;
  --r:6px;
  --t:100ms ease;
  --tok-kw:#ff7b72;
  --tok-str:#a5d6ff;
  --tok-cmt:#8b949e;
  --tok-num:#79c0ff;
  --tok-op:#ffa657;
  --tok-def:#e6edf3;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--mono);font-size:14px}

/* NAV */
#nav{
  position:fixed;top:0;left:0;right:0;height:var(--nav-h);
  background:var(--surface);border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 16px;z-index:100;gap:12px;
}
.nav-title{font-size:13px;font-weight:700;color:var(--accent);white-space:nowrap;letter-spacing:.03em}
#topic-jump{
  background:var(--surface2);color:var(--text);border:1px solid var(--border);
  border-radius:var(--r);padding:4px 8px;font-family:var(--mono);font-size:12px;cursor:pointer;
}
#topic-jump:focus{outline:2px solid var(--accent);outline-offset:1px}

/* LAYOUT */
#layout{display:flex;height:calc(100vh - var(--nav-h));margin-top:var(--nav-h);overflow:hidden}

/* SIDEBAR */
#sidebar{
  width:var(--sidebar-w);min-width:var(--sidebar-w);background:var(--surface);
  border-right:1px solid var(--border);display:flex;flex-direction:column;
  overflow:hidden;transition:width var(--t),min-width var(--t);
}
#sidebar.collapsed{width:40px;min-width:40px}
#sidebar-toggle{
  background:none;border:none;color:var(--text-dim);cursor:pointer;
  padding:10px;font-size:16px;text-align:center;flex-shrink:0;
  border-bottom:1px solid var(--border);transition:color var(--t);
}
#sidebar-toggle:hover{color:var(--accent)}
#topic-list{list-style:none;overflow-y:auto;flex:1;padding:4px 0}
#topic-list::-webkit-scrollbar{width:4px}
#topic-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.topic-item{
  display:flex;align-items:center;gap:8px;padding:7px 10px;
  cursor:pointer;transition:background var(--t);white-space:nowrap;overflow:hidden;
}
.topic-item:hover{background:var(--surface2)}
.topic-item.active{background:var(--accent-dim);color:#fff}
.topic-label{font-family:var(--mono);font-size:12px;font-weight:600}
.status-dot{
  width:10px;height:10px;border-radius:50%;flex-shrink:0;
  border:1.5px solid var(--text-dim);background:transparent;
  position:relative;overflow:hidden;transition:all var(--t);
}
.status-dot.half::after{
  content:'';position:absolute;left:0;top:0;width:50%;height:100%;background:var(--accent);
}
.status-dot.full{background:var(--accent);border-color:var(--accent)}
#sidebar.collapsed .topic-label{display:none}
#sidebar.collapsed .status-dot{margin:0 auto}
#sidebar.collapsed .topic-item{justify-content:center;padding:8px 0}
#sidebar.collapsed #sidebar-footer{display:none}
#sidebar-footer{
  padding:10px 12px;border-top:1px solid var(--border);flex-shrink:0;
}
#sidebar-footer a{
  color:var(--text-dim);text-decoration:none;font-size:11px;
  transition:color var(--t);display:block;margin-bottom:4px;
}
#sidebar-footer a:last-child{margin-bottom:0}
#sidebar-footer a:hover{color:var(--accent)}

/* MAIN */
#main-panel{flex:1;overflow:hidden;display:flex;flex-direction:column}
#topic-header{padding:12px 20px 0;flex-shrink:0}
#topic-title{font-size:18px;font-family:var(--mono);color:var(--accent);font-weight:700}

/* TABS */
#tabs{
  display:flex;gap:4px;padding:10px 20px 0;
  border-bottom:1px solid var(--border);flex-shrink:0;
}
.tab-btn{
  background:none;border:none;color:var(--text-dim);font-family:var(--mono);font-size:12px;
  font-weight:600;padding:7px 16px;cursor:pointer;border-bottom:2px solid transparent;
  transition:color var(--t),border-color var(--t);letter-spacing:.05em;
  text-transform:uppercase;margin-bottom:-1px;
}
.tab-btn:hover{color:var(--text)}
.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent)}

/* TAB CONTENT */
.tab-content{
  flex:1;min-height:0;overflow:hidden;display:flex;flex-direction:column;
  padding:16px 20px;animation:fadeIn var(--t);
}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

/* BUTTONS */
.btn{
  background:var(--accent);color:#fff;border:none;border-radius:var(--r);
  padding:7px 14px;font-family:var(--mono);font-size:12px;font-weight:600;
  cursor:pointer;transition:background var(--t);letter-spacing:.04em;white-space:nowrap;
  text-decoration:none;display:inline-flex;align-items:center;
}
.btn:hover{background:var(--accent-dim)}
.btn.secondary{background:var(--surface2);color:var(--text);border:1px solid var(--border)}
.btn.secondary:hover{background:var(--border)}
.btn.danger{background:#4a1515;color:#ffa0a0;border:1px solid #6b2020}
.btn.danger:hover{background:#6b2020}
.mode-btn{
  background:var(--surface2);color:var(--text-dim);border:1px solid var(--border);
  border-radius:var(--r);padding:6px 13px;font-family:var(--mono);font-size:12px;
  font-weight:600;cursor:pointer;transition:all var(--t);
}
.mode-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.mode-btn:hover:not(.active){color:var(--text)}

/* ─── BLOG TAB ─────────────────────────────────────────────────────────────── */
#blog-controls{
  display:flex;align-items:center;gap:8px;margin-bottom:14px;flex-shrink:0;flex-wrap:wrap;
}
#blog-controls .spacer{flex:1}

/* Save toast */
#save-toast{
  position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(12px);
  background:#1e2a1e;color:#7dde7d;border:1px solid #3a5c3a;
  border-radius:24px;padding:10px 22px;font-family:var(--mono);font-size:13px;
  font-weight:600;letter-spacing:.03em;white-space:nowrap;
  pointer-events:none;z-index:999;
  opacity:0;transition:opacity .2s ease,transform .2s ease;
}
#save-toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

#blog-edit{flex:1;min-height:0;display:flex;flex-direction:column;gap:10px}

#blog-meta-fields{
  display:grid;grid-template-columns:1fr 1fr;gap:8px;flex-shrink:0;
}
#blog-meta-fields input{
  background:var(--surface);color:var(--text);border:1px solid var(--border);
  border-radius:var(--r);padding:7px 10px;font-family:var(--mono);font-size:12px;
  transition:border-color var(--t);
}
#blog-meta-fields input:focus{outline:none;border-color:var(--accent)}
#blog-meta-fields input[type="date"]{color-scheme:dark}
#blog-meta-fields input::placeholder{color:var(--text-dim)}
#blog-meta-fields input#blog-title{grid-column:span 2;font-size:13px;font-weight:600}

#blog-textarea{
  flex:1;min-height:0;resize:none;background:var(--surface);color:var(--text);
  border:1px solid var(--border);border-radius:var(--r);padding:14px;
  font-family:var(--mono);font-size:13px;line-height:1.7;transition:border-color var(--t);
}
#blog-textarea:focus{outline:none;border-color:var(--accent)}

#blog-stats{
  display:flex;align-items:center;gap:16px;flex-shrink:0;font-size:11px;padding-top:2px;
}
#word-count,#read-time{color:var(--text-dim)}
#blog-autosave{margin-left:auto;color:var(--text-dim);opacity:0;transition:opacity .3s;font-size:11px}
#blog-autosave.visible{opacity:1}

/* ─── CODE TAB ─────────────────────────────────────────────────────────────── */
#snippet-tabs-bar{
  display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-shrink:0;min-height:36px;
}
#snippet-tabs{
  display:flex;gap:4px;flex:1;overflow-x:auto;align-items:center;padding-bottom:2px;
}
#snippet-tabs::-webkit-scrollbar{height:3px}
#snippet-tabs::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.snippet-tab{
  display:flex;align-items:center;gap:6px;background:var(--surface);
  border:1px solid var(--border);border-radius:var(--r);padding:5px 10px;
  font-family:var(--mono);font-size:11px;color:var(--text-dim);cursor:pointer;
  transition:all var(--t);white-space:nowrap;
}
.snippet-tab:hover{background:var(--surface2);color:var(--text)}
.snippet-tab.active{background:var(--accent-dim);color:#fff;border-color:var(--accent-dim)}
.snippet-tab-close{
  color:inherit;opacity:.6;font-size:14px;line-height:1;
  cursor:pointer;padding:0 2px;transition:opacity var(--t);
}
.snippet-tab-close:hover{opacity:1}

#snippet-editor{flex:1;min-height:0;display:flex;flex-direction:column}

.snippet-header{
  display:flex;align-items:center;gap:8px;flex-wrap:wrap;
  background:var(--surface);border:1px solid var(--border);border-radius:var(--r) var(--r) 0 0;
  padding:10px 12px;flex-shrink:0;
}
.snippet-name-input{
  background:transparent;color:var(--text);border:1px solid transparent;
  border-radius:4px;padding:4px 8px;font-family:var(--mono);font-size:13px;font-weight:600;
  min-width:120px;max-width:240px;transition:border-color var(--t);
}
.snippet-name-input:focus{outline:none;border-color:var(--accent);background:var(--surface2)}
.lang-select{
  background:var(--surface2);color:var(--text);border:1px solid var(--border);
  border-radius:var(--r);padding:4px 8px;font-family:var(--mono);font-size:11px;cursor:pointer;
}
.snippet-mode-btns{display:flex;gap:4px}

.snippet-body{
  flex:1;min-height:0;display:flex;flex-direction:column;
  border:1px solid var(--border);border-top:none;border-radius:0 0 var(--r) var(--r);overflow:hidden;
}
.code-textarea{
  flex:1;min-height:0;resize:none;background:var(--code-bg);color:var(--tok-def);
  border:none;padding:16px;font-family:var(--mono);font-size:13px;
  line-height:1.6;tab-size:4;white-space:pre;overflow:auto;caret-color:var(--accent);
}
.code-textarea:focus{outline:none}
.code-preview-wrap{flex:1;min-height:0;overflow:auto}
.code-preview-wrap::-webkit-scrollbar{width:6px;height:6px}
.code-preview-wrap::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

/* Code blocks */
.code-block{
  background:var(--code-bg);padding:0;margin:0;overflow-x:auto;
  font-family:var(--mono);font-size:13px;line-height:1.6;
}
.code-block code{display:block;padding:16px 20px;color:var(--tok-def);white-space:pre}
.ln{
  display:inline-block;min-width:3.5ch;color:#3d4452;text-align:right;
  margin-right:16px;user-select:none;-webkit-user-select:none;
}
.tok-keyword{color:var(--tok-kw)}
.tok-string{color:var(--tok-str)}
.tok-comment{color:var(--tok-cmt);font-style:italic}
.tok-number{color:var(--tok-num)}
.tok-operator{color:var(--tok-op)}

/* EMPTY STATE */
.empty-state{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  height:100%;color:var(--text-dim);text-align:center;gap:12px;
}
.empty-state p{font-size:13px;line-height:1.7}


/* MOBILE */
@media(max-width:640px){
  #blog-meta-fields{grid-template-columns:1fr}
  #blog-meta-fields input#blog-title{grid-column:span 1}
  #sidebar{
    position:fixed;top:var(--nav-h);left:0;bottom:0;z-index:50;
    transition:transform var(--t);
  }
  #sidebar.collapsed{transform:translateX(-100%);width:var(--sidebar-w);min-width:var(--sidebar-w)}
}
</style>
</head>

<script>
'use strict';

// ── Keywords ──────────────────────────────────────────────────────────────────
const KEYWORDS = {
  python: new Set(['def','return','if','elif','else','for','while','import',
    'class','and','or','not','in','True','False','None','with','as','try',
    'except','raise','pass','yield','lambda','from','global','del','is',
    'async','await','print','len','range','self','super','isinstance',
    'type','str','int','float','list','dict','set','bool','tuple']),
  typescript: new Set(['const','let','var','function','return','if','else',
    'for','while','class','import','export','from','async','await','typeof',
    'new','this','true','false','null','undefined','throw','try','catch',
    'interface','type','extends','implements','readonly','public','private',
    'protected','static','void','string','number','boolean','any','never',
    'enum','namespace','abstract','declare','keyof','infer','switch','case',
    'break','continue','do','default','finally','instanceof','of','yield']),
  javascript: new Set(['const','let','var','function','return','if','else',
    'for','while','class','import','export','from','async','await','typeof',
    'new','this','true','false','null','undefined','throw','try','catch',
    'switch','case','break','continue','do','default','finally','instanceof','of']),
  bash: new Set(['if','then','else','elif','fi','for','in','do','done',
    'while','case','esac','function','return','export','echo','local',
    'source','exit','shift','set','unset','readonly','declare']),
  json: new Set(['true','false','null']),
  text: new Set()
};

// ── Escape / Tokenizer / Highlighter / Markdown ───────────────────────────────
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function tokenize(code, lang) {
  const kws = KEYWORDS[lang] || KEYWORDS.text;
  const tokens = []; let i = 0; const n = code.length;
  while (i < n) {
    const ch = code[i], ch2 = code.slice(i,i+2), ch3 = code.slice(i,i+3);
    if ((ch==='#'&&(lang==='python'||lang==='bash'||lang==='text'))||
        (ch2==='\x2f\x2f'&&(lang==='typescript'||lang==='javascript'))) {
      let t=''; while(i<n&&code[i]!=='\n') t+=code[i++];
      tokens.push({type:'comment',text:t}); continue;
    }
    if (lang==='python'&&(ch3==='"""'||ch3==="'''")) {
      const q=ch3; let t=q; i+=3;
      while(i<n&&code.slice(i,i+3)!==q) t+=code[i++];
      if(i<n){t+=q;i+=3;} tokens.push({type:'string',text:t}); continue;
    }
    if (ch==='`'&&(lang==='typescript'||lang==='javascript')) {
      let t='`'; i++;
      while(i<n&&code[i]!=='`'){if(code[i]==='\\'){t+=code[i++];if(i<n)t+=code[i++];}else t+=code[i++];}
      if(i<n){t+='`';i++;} tokens.push({type:'string',text:t}); continue;
    }
    if (ch==='"'||ch==="'") {
      const q=ch; let t=q; i++;
      while(i<n&&code[i]!==q&&code[i]!=='\n'){if(code[i]==='\\'){t+=code[i++];if(i<n)t+=code[i++];}else t+=code[i++];}
      if(i<n&&code[i]===q){t+=q;i++;} tokens.push({type:'string',text:t}); continue;
    }
    if (/[0-9]/.test(ch)||(ch==='.'&&i+1<n&&/[0-9]/.test(code[i+1]))) {
      let t=''; while(i<n&&/[0-9.eExXbBoO_]/.test(code[i])) t+=code[i++];
      tokens.push({type:'number',text:t}); continue;
    }
    if (/[a-zA-Z_$]/.test(ch)) {
      let t=''; while(i<n&&/[a-zA-Z0-9_$]/.test(code[i])) t+=code[i++];
      tokens.push({type:kws.has(t)?'keyword':'default',text:t}); continue;
    }
    if (/[+\-*\/=<>!&|^~%@?:;.,[\]{}()]/.test(ch)) {
      tokens.push({type:'operator',text:ch}); i++; continue;
    }
    tokens.push({type:'default',text:ch}); i++;
  }
  return tokens;
}

function renderHighlighted(code, lang) {
  if (!code && code !== 0) code = '';
  const tokens = tokenize(String(code), lang || 'text');
  const lines = [[]];
  tokens.forEach(tok => {
    tok.text.split('\n').forEach((part, idx) => {
      if (idx > 0) lines.push([]);
      if (part !== '') lines[lines.length-1].push({type:tok.type,text:part});
    });
  });
  return lines.map((line, i) => {
    const num = String(i+1).padStart(4,' ');
    const content = line.map(tok => {
      const t = esc(tok.text);
      return tok.type==='default' ? t : `<span class="tok-${tok.type}">${t}</span>`;
    }).join('');
    return `<span class="ln" aria-hidden="true">${esc(num)} </span>${content}`;
  }).join('\n');
}

function parseMarkdown(text) {
  const lines = text.split('\n');
  let html = '', inCode = false, codeLang = 'text', codeLines = [];
  let inList = false, paraLines = [];
  function inline(s) {
    s = esc(s);
    s = s.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
    s = s.replace(/`([^`]+?)`/g,'<code>$1</code>');
    return s;
  }
  function flushPara() {
    if (!paraLines.length) return;
    html += `<p>${paraLines.map(inline).join('<br>')}</p>\n`; paraLines = [];
  }
  function flushList() { if (!inList) return; html += '</ul>\n'; inList = false; }
  function flushCode() {
    html += `<pre class="code-block" data-lang="${esc(codeLang)}"><code>${renderHighlighted(codeLines.join('\n'),codeLang)}</code></pre>\n`;
    codeLines = []; inCode = false; codeLang = 'text';
  }
  for (const l of lines) {
    if (/^```/.test(l)) {
      if (inCode) { flushCode(); }
      else {
        flushPara(); flushList(); inCode = true; codeLines = [];
        let lang = l.trim().slice(3).toLowerCase()||'text';
        if (lang==='js') lang='javascript'; if (lang==='ts') lang='typescript';
        if (lang==='sh'||lang==='shell'||lang==='zsh') lang='bash';
        codeLang = lang;
      }
      continue;
    }
    if (inCode) { codeLines.push(l); continue; }
    let m;
    if ((m=l.match(/^(#{1,3})\s+(.*)/))) {
      flushPara(); flushList();
      const lvl=m[1].length, cls=lvl===2?' class="ruled"':'';
      html += `<h${lvl}${cls}>${inline(m[2])}</h${lvl}>\n`;
    } else if ((m=l.match(/^>\s?(.*)/))) {
      flushPara(); flushList();
      html += `<blockquote><p>${inline(m[1])}</p></blockquote>\n`;
    } else if ((m=l.match(/^[-*]\s+(.*)/))) {
      flushPara(); if (!inList){html+='<ul>\n';inList=true;}
      html += `<li>${inline(m[1])}</li>\n`;
    } else if (!l.trim()) { flushPara(); flushList(); }
    else { flushList(); paraLines.push(l); }
  }
  flushPara(); flushList(); if (inCode) flushCode();
  return html;
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function wordStats(text) {
  const words = (text.trim().match(/\S+/g)||[]).length;
  return {words, mins: Math.max(1, Math.round(words/200))};
}
function todayDate() { return new Date().toISOString().slice(0,10); }
const lsGet    = k      => FS.get(k);
const lsSet    = (k, v) => FS.set(k, v);
const lsRemove = k      => FS.del(k);
const blogKey = n => `sprint_t${n}_blog`;
const codeKey = n => `sprint_t${n}_code`;

function topicStatus(n) {
  const raw = FS.get('sprint_status');
  if (!raw) return 'empty';
  let obj; try { obj = JSON.parse(raw); } catch { return 'empty'; }
  const t = obj[`t${n}`] || {};
  const b = !!t.blog, c = !!t.code;
  if (b && c) return 'full';
  if (b || c) return 'half';
  return 'empty';
}

async function copyToClipboard(text) {
  try { await navigator.clipboard.writeText(text); return true; }
  catch {
    const ta = Object.assign(document.createElement('textarea'),{value:text,style:'position:fixed;opacity:0'});
    document.body.appendChild(ta); ta.select();
    const ok = document.execCommand('copy'); ta.remove(); return ok;
  }
}

function showSaved(id, msg='✓ Saved') {
  const el = document.getElementById(id); if (!el) return;
  el.textContent = msg; el.classList.add('visible');
  clearTimeout(el._t); el._t = setTimeout(()=>el.classList.remove('visible'), 2200);
}

function showSaveToast(msg='✓ Blog post saved') {
  const toast = document.getElementById('save-toast');
  toast.textContent = msg;
  toast.classList.add('show');
  clearTimeout(toast._t);
  toast._t = setTimeout(()=>toast.classList.remove('show'), 2400);
}

function flashBtn(id, text) {
  const btn = document.getElementById(id); if (!btn) return;
  const orig = btn.textContent; btn.textContent = text;
  setTimeout(()=>{ if(btn) btn.textContent = orig; }, 1600);
}

// ── State ─────────────────────────────────────────────────────────────────────
let currentTopic      = 1;
let currentTab        = 'blog';
let snippets          = [];
let snippetModes      = [];
let currentSnippetIdx = 0;
let blogSaveTimer     = null;
let codeSaveTimer     = null;

// ── Sidebar ───────────────────────────────────────────────────────────────────
function buildSidebar() {
  const list = document.getElementById('topic-list');
  const jump = document.getElementById('topic-jump');
  list.innerHTML = ''; jump.innerHTML = '';
  for (let n=1; n<=30; n++) {
    const st = topicStatus(n);
    const li = document.createElement('li');
    li.className = 'topic-item'+(n===currentTopic?' active':'');
    li.dataset.n = n;
    li.innerHTML = `<span class="status-dot ${st}"></span><span class="topic-label">T${n}</span>`;
    li.addEventListener('click', ()=>loadTopic(n));
    list.appendChild(li);
    const opt = Object.assign(document.createElement('option'),{value:n,textContent:`T${n}`});
    if (n===currentTopic) opt.selected=true;
    jump.appendChild(opt);
  }
}

function refreshSidebarStatus() {
  document.querySelectorAll('.topic-item').forEach(li => {
    li.querySelector('.status-dot').className = `status-dot ${topicStatus(parseInt(li.dataset.n))}`;
  });
}

// ── Routing ───────────────────────────────────────────────────────────────────
async function loadTopic(n) {
  currentTopic = n;
  document.getElementById('topic-title').textContent = `T${n}`;
  document.getElementById('topic-jump').value = n;
  document.querySelectorAll('.topic-item').forEach(li=>
    li.classList.toggle('active', parseInt(li.dataset.n)===n));
  // Update preview link hash
  document.getElementById('btn-open-preview').href = `ai-blog-preview.html#t${n}`;
  // Fetch topic files from GitHub (reads via raw URL — no token needed)
  await FS.loadTopic(n);
  switchTab(currentTab, true);
}

function switchTab(tab, force) {
  if (tab===currentTab && !force) return;
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.toggle('active',b.dataset.tab===tab));
  document.getElementById('tab-blog').style.display = tab==='blog'?'flex':'none';
  document.getElementById('tab-code').style.display = tab==='code'?'flex':'none';
  if (tab==='blog') renderBlogTab(); else renderCodeTab();
}

// ── Blog Tab ──────────────────────────────────────────────────────────────────
function getBlogData() {
  const raw = lsGet(blogKey(currentTopic));
  if (raw) { try { return JSON.parse(raw); } catch {} }
  return {title:'', subtitle:'', date:todayDate(), tags:'', body:''};
}

async function saveBlogData(auto) {
  if (!FS.canWrite) {
    if (!auto) showSaveToast('⚠ Select the sprint folder first (📁 button)');
    return;
  }
  try {
    await lsSet(blogKey(currentTopic), JSON.stringify({
      title:    document.getElementById('blog-title').value,
      subtitle: document.getElementById('blog-subtitle').value,
      date:     document.getElementById('blog-date').value,
      tags:     document.getElementById('blog-tags').value,
      body:     document.getElementById('blog-textarea').value,
    }));
    refreshSidebarStatus();
    if (auto) showSaved('blog-autosave','auto-saved');
    else      showSaveToast(`✓ T${currentTopic} saved`);
  } catch(e) {
    if (!auto) showSaveToast(`✗ Save failed`);
    else console.warn('Blog save failed:', e);
  }
}

function renderBlogTab() {
  const d = getBlogData();
  document.getElementById('blog-title').value    = d.title    || '';
  document.getElementById('blog-subtitle').value = d.subtitle || '';
  document.getElementById('blog-date').value     = d.date     || todayDate();
  document.getElementById('blog-tags').value     = d.tags     || '';
  document.getElementById('blog-textarea').value = d.body     || '';
  updateBlogStats();
}

function updateBlogStats() {
  const {words, mins} = wordStats(document.getElementById('blog-textarea').value);
  document.getElementById('word-count').textContent = `${words.toLocaleString()} words`;
  document.getElementById('read-time').textContent  = `~${mins} min read`;
}

// Build rendered HTML in memory (no DOM mutation needed)
function buildBlogHtml(d) {
  const {words, mins} = wordStats(d.body||'');
  const tags = (d.tags||'').split(',').map(t=>t.trim()).filter(Boolean);
  const dateStr = d.date
    ? new Date(d.date+'T12:00:00').toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'})
    : '';
  const tagsHtml = tags.map(t=>`<span class="tag-pill">${esc(t)}</span>`).join('');
  return [
    d.title    ? `<h1 class="post-title">${esc(d.title)}</h1>`          : '',
    d.subtitle ? `<p class="post-subtitle">${esc(d.subtitle)}</p>`      : '',
    `<div class="post-meta">`,
    dateStr ? `<span class="post-date">${esc(dateStr)}</span>` : '',
    words>0 ? `<span class="post-readtime">~${mins} min read · ${words.toLocaleString()} words</span>` : '',
    tagsHtml,
    `</div>`,
    `<div class="post-body">${d.body ? parseMarkdown(d.body) : ''}</div>`,
  ].join('\n').trim();
}

async function copyMarkdown() {
  const ok = await copyToClipboard(document.getElementById('blog-textarea').value);
  if (ok) flashBtn('btn-copy-md','✓ Copied!');
}

async function copyRenderedHtml() {
  const d = getBlogData();
  const ok = await copyToClipboard(buildBlogHtml(d));
  if (ok) flashBtn('btn-copy-html','✓ Copied!');
}

// ── Code Tab ──────────────────────────────────────────────────────────────────
function getCodeData() {
  const raw = lsGet(codeKey(currentTopic));
  if (raw) { try { const a=JSON.parse(raw); if(Array.isArray(a)) return a; } catch {} }
  return [];
}

async function saveCodeData() {
  if (!FS.canWrite) return; // silently skip — not local or no folder
  try {
    await lsSet(codeKey(currentTopic), JSON.stringify(
      snippets.map(s=>({name:s.name,language:s.language,body:s.body}))
    ));
    refreshSidebarStatus();
  } catch(e) { console.warn('Code save failed:', e); }
}

function renderCodeTab() {
  snippets = getCodeData();
  snippetModes = snippets.map(()=>'edit');
  if (currentSnippetIdx >= snippets.length) currentSnippetIdx = 0;
  renderSnippetTabsBar();
  renderSnippetEditor();
}

function renderSnippetTabsBar() {
  document.getElementById('snippet-tabs').innerHTML = snippets.map((s,i)=>`
    <button class="snippet-tab${i===currentSnippetIdx?' active':''}" onclick="selectSnippet(${i})">
      <span>${esc(s.name||`Snippet ${i+1}`)}</span>
      <span class="snippet-tab-close" onclick="deleteSnippet(event,${i})" title="Delete">×</span>
    </button>`).join('');
}

function renderSnippetEditor() {
  const container = document.getElementById('snippet-editor');
  if (!snippets.length) {
    container.innerHTML=`<div class="empty-state">
      <div style="font-size:32px;color:var(--border)">{ }</div>
      <p>No code snippets yet.<br>Click <strong>+ Add Snippet</strong> to create one.</p>
    </div>`; return;
  }
  const s = snippets[currentSnippetIdx];
  const mode = snippetModes[currentSnippetIdx]||'edit';
  const langs = ['python','typescript','javascript','bash','json','text'];
  const langOpts = langs.map(l=>`<option value="${l}"${l===s.language?' selected':''}>${l}</option>`).join('');
  const bodyContent = mode==='edit'
    ? `<textarea class="code-textarea" id="snippet-textarea" spellcheck="false" autocorrect="off" autocapitalize="off">${esc(s.body)}</textarea>`
    : `<div class="code-preview-wrap"><pre class="code-block" data-lang="${esc(s.language)}"><code>${renderHighlighted(s.body,s.language)}</code></pre></div>`;
  container.innerHTML=`
    <div class="snippet-header">
      <input type="text" class="snippet-name-input" id="snippet-name" value="${esc(s.name)}" placeholder="Snippet name…">
      <select class="lang-select" id="snippet-lang">${langOpts}</select>
      <div class="snippet-mode-btns">
        <button class="mode-btn${mode==='edit'?' active':''}" id="snip-btn-edit">Edit</button>
        <button class="mode-btn${mode==='preview'?' active':''}" id="snip-btn-preview">Preview</button>
      </div>
      <button class="btn secondary" id="snip-copy-btn">Copy</button>
    </div>
    <div class="snippet-body" id="snippet-body">${bodyContent}</div>`;
  wireSnippetEvents(mode);
}

function wireSnippetEvents(mode) {
  document.getElementById('snippet-name').addEventListener('input', function() {
    snippets[currentSnippetIdx].name = this.value;
    const tabs = document.querySelectorAll('.snippet-tab');
    if (tabs[currentSnippetIdx]) tabs[currentSnippetIdx].querySelector('span:first-child').textContent = this.value||`Snippet ${currentSnippetIdx+1}`;
    clearTimeout(codeSaveTimer); codeSaveTimer=setTimeout(saveCodeData,800);
  });
  document.getElementById('snippet-lang').addEventListener('change', function() {
    snippets[currentSnippetIdx].language = this.value;
    clearTimeout(codeSaveTimer); codeSaveTimer=setTimeout(saveCodeData,800);
    if (snippetModes[currentSnippetIdx]==='preview') setSnippetMode('preview');
  });
  document.getElementById('snip-btn-edit').addEventListener('click',    ()=>setSnippetMode('edit'));
  document.getElementById('snip-btn-preview').addEventListener('click', ()=>setSnippetMode('preview'));
  document.getElementById('snip-copy-btn').addEventListener('click', async()=>{
    const ok = await copyToClipboard(snippets[currentSnippetIdx].body);
    if (ok) flashBtn('snip-copy-btn','✓ Copied!');
  });
  if (mode==='edit') wireTextarea();
}

function wireTextarea() {
  const ta = document.getElementById('snippet-textarea'); if (!ta) return;
  ta.addEventListener('input', function() {
    snippets[currentSnippetIdx].body = this.value;
    clearTimeout(codeSaveTimer); codeSaveTimer=setTimeout(saveCodeData,800);
  });
  ta.addEventListener('keydown', function(e) {
    if (e.key==='Tab') {
      e.preventDefault();
      const s=this.selectionStart, end=this.selectionEnd;
      this.value=this.value.slice(0,s)+'    '+this.value.slice(end);
      this.selectionStart=this.selectionEnd=s+4;
    }
  });
  setTimeout(()=>ta.focus(),0);
}

function setSnippetMode(mode) {
  if (snippetModes[currentSnippetIdx]==='edit') {
    const ta=document.getElementById('snippet-textarea');
    if (ta) snippets[currentSnippetIdx].body=ta.value;
  }
  snippetModes[currentSnippetIdx]=mode;
  document.getElementById('snip-btn-edit')?.classList.toggle('active',mode==='edit');
  document.getElementById('snip-btn-preview')?.classList.toggle('active',mode==='preview');
  const body=document.getElementById('snippet-body'); if (!body) return;
  const s=snippets[currentSnippetIdx];
  if (mode==='edit') {
    body.innerHTML=`<textarea class="code-textarea" id="snippet-textarea" spellcheck="false" autocorrect="off" autocapitalize="off">${esc(s.body)}</textarea>`;
    wireTextarea();
  } else {
    body.innerHTML=`<div class="code-preview-wrap"><pre class="code-block" data-lang="${esc(s.language)}"><code>${renderHighlighted(s.body,s.language)}</code></pre></div>`;
  }
}

function selectSnippet(idx) {
  if (snippetModes[currentSnippetIdx]==='edit') {
    const ta=document.getElementById('snippet-textarea');
    if (ta) snippets[currentSnippetIdx].body=ta.value;
  }
  currentSnippetIdx=idx; renderSnippetTabsBar(); renderSnippetEditor();
}

function deleteSnippet(event, idx) {
  event.stopPropagation();
  if (!confirm(`Delete "${snippets[idx]?.name||`Snippet ${idx+1}`}"?`)) return;
  snippets.splice(idx,1); snippetModes.splice(idx,1);
  currentSnippetIdx=Math.max(0,Math.min(currentSnippetIdx,snippets.length-1));
  saveCodeData(); renderSnippetTabsBar(); renderSnippetEditor();
}

function addSnippet() {
  snippets.push({name:`Snippet ${snippets.length+1}`,language:'python',body:''});
  snippetModes.push('edit');
  currentSnippetIdx=snippets.length-1;
  saveCodeData(); renderSnippetTabsBar(); renderSnippetEditor();
}

// ── Init ──────────────────────────────────────────────────────────────────────
(async function init() {
  document.getElementById('blog-date').value = todayDate();

  document.getElementById('topic-jump').addEventListener('change', function() {
    loadTopic(parseInt(this.value));
  });
  document.querySelectorAll('.tab-btn').forEach(b=>b.addEventListener('click',()=>switchTab(b.dataset.tab)));
  document.getElementById('sidebar-toggle').addEventListener('click',()=>
    document.getElementById('sidebar').classList.toggle('collapsed'));

  document.getElementById('btn-save-blog').addEventListener('click', ()=>saveBlogData(false));
  document.getElementById('btn-copy-md').addEventListener('click',   copyMarkdown);
  document.getElementById('btn-copy-html').addEventListener('click', copyRenderedHtml);
  document.getElementById('btn-add-snippet').addEventListener('click', addSnippet);

  ['blog-title','blog-subtitle','blog-date','blog-tags','blog-textarea'].forEach(id=>{
    document.getElementById(id)?.addEventListener('input', ()=>{
      if (id==='blog-textarea') updateBlogStats();
      clearTimeout(blogSaveTimer);
      blogSaveTimer=setTimeout(()=>saveBlogData(true), 800);
    });
  });

  await FS.loadStatus();
  buildSidebar();
  await loadTopic(1);
})();
</script>
